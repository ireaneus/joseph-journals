<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#111111"></rect>

  <!-- Orbit circle (all things) -->
  <circle cx="32" cy="32" r="18" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.9"></circle>

  <!-- Cross (Christ at center) -->
  <rect x="30" y="16" width="4" height="32" fill="#ffffff"></rect>
  <rect x="22" y="28" width="20" height="4" fill="#ffffff"></rect>

  <!-- Small orbit accents (creation detail) -->
  <circle cx="32" cy="14" r="1.5" fill="#ffffff"></circle>
  <circle cx="50" cy="32" r="1.5" fill="#ffffff"></circle>
  <circle cx="32" cy="50" r="1.5" fill="#ffffff"></circle>
  <circle cx="14" cy="32" r="1.5" fill="#ffffff"></circle>
</svg>